version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: safily-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: safily_password_123
      MONGO_INITDB_DATABASE: safily
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - safily-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: safily-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - safily-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  redis_data:

networks:
  safily-network:
    driver: bridge